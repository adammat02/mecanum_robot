joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_node:
  ros__parameters:
    publish_stamped_twist: true
    frame: 'base_link'

    axis_linear:
      x: 1
      y: 3
    scale_linear:
      x: 0.8
      y: 0.8
    scale_linear_turbo:
      x: 3.0
      y: 3.0

    axis_angular:
      yaw: 0
    scale_angular:
      yaw: 1.0
    scale_angular_turbo:
      yaw: 3.0

    require_enable_button: true
    enable_button: 5
    enable_turbo_button: 0